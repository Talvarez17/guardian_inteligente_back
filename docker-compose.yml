services:
  postgres:
    image: postgres:18-alpine
    container_name: guardian_inteligente_db
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - '${DB_PORT}:5432'
    volumes:
      - guardian_inteligente_pgdata:/var/lib/postgresql

volumes:
  guardian_inteligente_pgdata:
